name: Source Check

on:
  push:
    branches:
      - "main"
  pull_request:
    types: [review_requested, ready_for_review]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: i18n
        run: bun run i18n

      - name: Lint
        run: bun run lint

      - name: Format
        run: bun run format

      - name: Drizzle
        run: bunx drizzle-kit check

      - name: Build
        run: bun run build
